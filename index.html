<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Run, Cookie, Run!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Basic single-column, mobile-first layout */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050608;
      color: #f7f7f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Single full-width column container */
    .game-shell {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background: radial-gradient(circle at top, #252746 0, #050608 65%);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 26px 60px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(0, 0, 0, 0.7);
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Small unobtrusive help label (font 22px) */
    .hud-overlay {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: rgba(245, 245, 245, 0.8);
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="gameCanvas"></canvas>
    <div class="hud-overlay">
      SPACE = Jump · ↓ = Slide · R = Restart
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      /*** CANVAS SETUP ********************************************************/

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      // Internal logical resolution; canvas is scaled to fit container via CSS.
      const GAME_WIDTH = 960;
      const GAME_HEIGHT = 540;
      canvas.width = GAME_WIDTH;
      canvas.height = GAME_HEIGHT;

      /*** GAME STATE **********************************************************/

      const State = {
        START: "start",
        PLAYING: "playing",
        GAME_OVER: "gameover",
      };

      let gameState = State.START;

      // Timing
      let lastTimestamp = 0;
      let elapsedSinceStart = 0;

      // Score / speed / level
      let score = 0;
      let highScore = loadHighScore();
      let baseSpeed = 280; // world scroll speed in px/sec at t=0
      let speedIncreasePerSec = 18; // difficulty ramp
      let currentSpeed = baseSpeed;

      // Level themes (change every 30 seconds)
      const THEME_DURATION = 30; // seconds
      const Themes = [
        {
          name: "Kitchen",
          skyColor: "#fef2d9",
          groundColor: "#f4d2a1",
        },
        {
          name: "Backyard",
          skyColor: "#c7f3ff",
          groundColor: "#86c57a",
        },
        {
          name: "City Street",
          skyColor: "#c8d8f6",
          groundColor: "#9ea4b0",
        },
      ];
      let themeIndex = 0;

      // Obstacles
      const obstacles = [];
      let obstacleSpawnTimer = 0;
      let minSpawnInterval = 1.1; // seconds; will slightly decrease with speed
      let maxSpawnInterval = 2.0;
      let nextSpawnIn = 1.5;

      // Cookie player
      const cookie = {
        x: 240,
        y: 0,
        width: 80,
        height: 80,
        baseHeight: 80,
        slideHeight: 48,
        vy: 0,
        gravity: 1400,
        jumpForce: -620,
        onGround: false,
        sliding: false,
        slideTimer: 0,
        maxSlideTime: 0.45,
        hitSlowFactor: 1.0,
        hitSlowTimer: 0,
        maxHitSlowTime: 1.2,
        hitFlashTimer: 0,
      };

      const groundY = GAME_HEIGHT - 90;

      // Hungry kid chasing from behind
      const kid = {
        baseDistance: 260, // ideal gap in px between kid and cookie
        minDistance: 40, // if below this, cookie is caught
        maxDistance: 320,
        distance: 260,
        // base catch-up speed per second (positive reduces distance)
        creepRate: 3,
      };

      // Simple screen shake on catch
      let shakeTimer = 0;
      const SHAKE_DURATION = 0.4;
      const SHAKE_INTENSITY = 10;

      // Input state
      const keysDown = Object.create(null);

      // Game over reason
      let gameOverReason = "";

      /*** SOUND (WEB AUDIO, NO FILES) *****************************************/

      let audioCtx = null;

      function getAudioContext() {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            audioCtx = new AudioContext();
          }
        }
        return audioCtx;
      }

      /**
       * Small helper to play a simple beep sweep (for jump, catch, etc.).
       */
      function playBeep(options) {
        const ctxAudio = getAudioContext();
        if (!ctxAudio) return;

        const {
          frequencyStart = 600,
          frequencyEnd = 400,
          duration = 0.12,
          type = "square",
          volume = 0.2,
        } = options || {};

        const osc = ctxAudio.createOscillator();
        const gain = ctxAudio.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(frequencyStart, ctxAudio.currentTime);
        osc.frequency.linearRampToValueAtTime(
          frequencyEnd,
          ctxAudio.currentTime + duration
        );

        gain.gain.setValueAtTime(volume, ctxAudio.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.001,
          ctxAudio.currentTime + duration
        );

        osc.connect(gain);
        gain.connect(ctxAudio.destination);

        osc.start();
        osc.stop(ctxAudio.currentTime + duration);
      }

      function playJumpSound() {
        playBeep({
          frequencyStart: 420,
          frequencyEnd: 820,
          duration: 0.13,
          type: "square",
          volume: 0.22,
        });
      }

      function playCatchSound() {
        playBeep({
          frequencyStart: 260,
          frequencyEnd: 80,
          duration: 0.25,
          type: "sawtooth",
          volume: 0.25,
        });
      }

      /*** HIGH SCORE PERSISTENCE **********************************************/

      function loadHighScore() {
        try {
          const stored = localStorage.getItem("runCookieRunHighScore");
          const n = stored ? Number(stored) : 0;
          return Number.isFinite(n) && n >= 0 ? n : 0;
        } catch {
          return 0;
        }
      }

      function saveHighScore(value) {
        try {
          localStorage.setItem("runCookieRunHighScore", String(value));
        } catch {
          // ignore if storage unavailable
        }
      }

      /*** INPUT HANDLING ******************************************************/

      window.addEventListener("keydown", function (e) {
        keysDown[e.code] = true;

        // First interaction may unlock audio context
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        } else if (!audioCtx) {
          getAudioContext();
        }

        if (e.code === "Enter") {
          if (gameState === State.START || gameState === State.GAME_OVER) {
            e.preventDefault();
            startGame();
          }
        }

        if (e.code === "KeyR") {
          if (gameState === State.GAME_OVER) {
            e.preventDefault();
            startGame();
          }
        }

        if (gameState === State.PLAYING) {
          if (e.code === "Space" || e.code === "ArrowUp") {
            e.preventDefault();
            tryJump();
          } else if (e.code === "ArrowDown") {
            e.preventDefault();
            trySlide();
          }
        }
      });

      window.addEventListener("keyup", function (e) {
        keysDown[e.code] = false;
      });

      /*** GAME CONTROL *******************************************************/

      function resetGameVariables() {
        elapsedSinceStart = 0;
        score = 0;
        currentSpeed = baseSpeed;
        themeIndex = 0;
        obstacleSpawnTimer = 0;
        nextSpawnIn = 1.3;
        obstacles.length = 0;
        gameOverReason = "";

        cookie.x = 240;
        cookie.y = groundY - cookie.baseHeight;
        cookie.width = 80;
        cookie.height = cookie.baseHeight;
        cookie.vy = 0;
        cookie.onGround = true;
        cookie.sliding = false;
        cookie.slideTimer = 0;
        cookie.hitSlowFactor = 1;
        cookie.hitSlowTimer = 0;
        cookie.hitFlashTimer = 0;

        kid.distance = kid.baseDistance;

        shakeTimer = 0;
      }

      function startGame() {
        resetGameVariables();
        gameState = State.PLAYING;
      }

      function endGame(reason) {
        gameState = State.GAME_OVER;
        gameOverReason = reason || "Caught!";
        shakeTimer = SHAKE_DURATION;
        playCatchSound();

        if (score > highScore) {
          highScore = score;
          saveHighScore(highScore);
        }
      }

      /*** PLAYER ACTIONS ******************************************************/

      function tryJump() {
        if (!cookie.onGround) return;
        cookie.vy = cookie.jumpForce;
        cookie.onGround = false;
        cookie.sliding = false;
        cookie.slideTimer = 0;
        cookie.height = cookie.baseHeight;
        playJumpSound();
      }

      function trySlide() {
        if (!cookie.onGround) return;
        if (cookie.sliding) return;
        cookie.sliding = true;
        cookie.slideTimer = cookie.maxSlideTime;
        const bottom = cookie.y + cookie.height;
        cookie.height = cookie.slideHeight;
        cookie.y = bottom - cookie.height;
      }

      /*** OBSTACLES ***********************************************************/

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      /**
       * Returns an obstacle description tailored to the current theme.
       * Types:
       * - "low": must be jumped
       * - "high": must be slid under
       */
      function createObstacleForTheme(themeName) {
        const baseX = GAME_WIDTH + 80;
        const groundTop = groundY;

        // Defaults used if theme not explicitly handled
        let obstacle = {
          x: baseX,
          y: groundTop - 70,
          width: 70,
          height: 70,
          type: "low",
          theme: themeName,
          hit: false,
        };

        if (themeName === "Kitchen") {
          const choice = Math.random();
          if (choice < 0.4) {
            // Rolling pin on ground -> low obstacle
            obstacle.width = 120;
            obstacle.height = 26;
            obstacle.y = groundTop - obstacle.height;
            obstacle.type = "low";
            obstacle.kind = "rollingPin";
          } else if (choice < 0.75) {
            // Spill puddle - low & wide, mostly cosmetic but still slows
            obstacle.width = 160;
            obstacle.height = 18;
            obstacle.y = groundTop - 6;
            obstacle.type = "low";
            obstacle.kind = "milkPuddle";
          } else {
            // Falling spoon -> high obstacle
            obstacle.width = 40;
            obstacle.height = 120;
            obstacle.y = groundTop - 140;
            obstacle.type = "high";
            obstacle.kind = "spoon";
          }
        } else if (themeName === "Backyard") {
          const choice = Math.random();
          if (choice < 0.4) {
            // Sprinkler head on ground
            obstacle.width = 70;
            obstacle.height = 40;
            obstacle.y = groundTop - obstacle.height;
            obstacle.type = "low";
            obstacle.kind = "sprinkler";
          } else if (choice < 0.75) {
            // Dog toy (ball/rope)
            obstacle.width = 60;
            obstacle.height = 50;
            obstacle.y = groundTop - obstacle.height;
            obstacle.type = "low";
            obstacle.kind = "dogToy";
          } else {
            // Garden rake head -> high
            obstacle.width = 80;
            obstacle.height = 110;
            obstacle.y = groundTop - 130;
            obstacle.type = "high";
            obstacle.kind = "rake";
          }
        } else if (themeName === "City Street") {
          const choice = Math.random();
          if (choice < 0.4) {
            // Trash can - jump
            obstacle.width = 80;
            obstacle.height = 90;
            obstacle.y = groundTop - obstacle.height;
            obstacle.type = "low";
            obstacle.kind = "trashCan";
          } else if (choice < 0.75) {
            // Pigeons (low, but stylized)
            obstacle.width = 110;
            obstacle.height = 40;
            obstacle.y = groundTop - obstacle.height;
            obstacle.type = "low";
            obstacle.kind = "pigeons";
          } else {
            // Street sign - high
            obstacle.width = 70;
            obstacle.height = 130;
            obstacle.y = groundTop - 150;
            obstacle.type = "high";
            obstacle.kind = "streetSign";
          }
        }

        return obstacle;
      }

      function scheduleNextObstacleSpawn() {
        // Faster speed ⇒ slightly more frequent obstacles
        const speedFactor = Math.min(currentSpeed / baseSpeed, 2.2);
        const min = Math.max(0.7, minSpawnInterval / speedFactor);
        const max = Math.max(1.4, maxSpawnInterval / (speedFactor * 0.9));
        nextSpawnIn = randomRange(min, max);
        obstacleSpawnTimer = 0;
      }

      /*** COLLISION & HIT HANDLING ********************************************/

      function rectsOverlap(a, b) {
        return !(
          a.x + a.width < b.x ||
          a.x > b.x + b.width ||
          a.y + a.height < b.y ||
          a.y > b.y + b.height
        );
      }

      function handleObstacleHit(obstacle) {
        if (obstacle.hit) return;
        obstacle.hit = true;

        // Cookie slows for a short period; kid gains distance
        cookie.hitSlowFactor = 0.55;
        cookie.hitSlowTimer = cookie.maxHitSlowTime;
        cookie.hitFlashTimer = 0.35;

        // Kid catches up significantly on each hit
        kid.distance -= 65;
        if (kid.distance < kid.minDistance) {
          kid.distance = kid.minDistance;
        }
      }

      /*** UPDATE LOOP *********************************************************/

      function update(deltaSec) {
        if (gameState !== State.PLAYING) return;

        elapsedSinceStart += deltaSec;

        // Update theme every THEME_DURATION seconds
        const themeSlot = Math.floor(elapsedSinceStart / THEME_DURATION);
        themeIndex = themeSlot % Themes.length;
        const theme = Themes[themeIndex];

        // Speed ramps up gradually
        currentSpeed =
          baseSpeed + speedIncreasePerSec * Math.min(elapsedSinceStart, 90);

        // Apply temporary slowdown when recently hit
        if (cookie.hitSlowTimer > 0) {
          cookie.hitSlowTimer -= deltaSec;
          if (cookie.hitSlowTimer <= 0) {
            cookie.hitSlowFactor = 1;
          }
        }

        const worldSpeed = currentSpeed * cookie.hitSlowFactor;

        if (cookie.hitFlashTimer > 0) {
          cookie.hitFlashTimer -= deltaSec;
        }

        // Score: increases with time and a bit with speed
        score += deltaSec * (10 + worldSpeed * 0.03);

        /*** UPDATE PLAYER PHYSICS *********************************************/

        // Gravity / jumping
        cookie.vy += cookie.gravity * deltaSec;
        cookie.y += cookie.vy * deltaSec;

        if (cookie.y + cookie.height >= groundY) {
          cookie.y = groundY - cookie.height;
          cookie.vy = 0;
          cookie.onGround = true;
        } else {
          cookie.onGround = false;
        }

        // Slide timer and height reset
        if (cookie.sliding) {
          cookie.slideTimer -= deltaSec;
          if (cookie.slideTimer <= 0 || !keysDown["ArrowDown"]) {
            // End slide: restore height, keeping feet on ground
            const bottom = cookie.y + cookie.height;
            cookie.height = cookie.baseHeight;
            cookie.y = bottom - cookie.height;
            cookie.sliding = false;
          }
        }

        /*** OBSTACLE SPAWNING & MOVEMENT *************************************/

        obstacleSpawnTimer += deltaSec;
        if (obstacleSpawnTimer >= nextSpawnIn) {
          const newObstacle = createObstacleForTheme(theme.name);
          obstacles.push(newObstacle);
          scheduleNextObstacleSpawn();
        }

        // Move obstacles to the left
        const obstacleSpeed = worldSpeed;
        for (let i = obstacles.length - 1; i >= 0; i--) {
          const o = obstacles[i];
          o.x -= obstacleSpeed * deltaSec;
          if (o.x + o.width < -50) {
            obstacles.splice(i, 1);
          }
        }

        /*** COLLISIONS ********************************************************/

        const cookieRect = {
          x: cookie.x + 10,
          y: cookie.y + 10,
          width: cookie.width - 20,
          height: cookie.height - 12,
        };

        for (let i = 0; i < obstacles.length; i++) {
          const o = obstacles[i];
          const obstacleRect = {
            x: o.x + 4,
            y: o.y + 4,
            width: o.width - 8,
            height: o.height - 8,
          };

          if (!rectsOverlap(cookieRect, obstacleRect)) continue;

          // Check if cookie correctly avoided the obstacle
          const isJumping = !cookie.onGround && cookie.vy < 0;
          const isInAirAbove =
            cookie.y + cookie.height <= o.y + o.height * 0.3;

          const isSliding =
            cookie.sliding && cookie.height === cookie.slideHeight;

          if (o.type === "low") {
            // Low obstacle: safe if in air above it
            if (isJumping && isInAirAbove) {
              continue;
            }
          } else if (o.type === "high") {
            // High obstacle: safe if sliding
            if (isSliding) {
              continue;
            }
          }

          handleObstacleHit(o);
        }

        /*** HUNGRY KID DISTANCE ***********************************************/

        // Kid naturally creeps closer over time
        kid.distance -= kid.creepRate * deltaSec;

        // Extra catch-up when slowed
        if (cookie.hitSlowFactor < 1) {
          const extra = (1 - cookie.hitSlowFactor) * 90 * deltaSec;
          kid.distance -= extra;
        } else {
          // Slight chance to pull ahead if playing well (never fully safe)
          kid.distance += 5 * deltaSec;
        }

        // Clamp
        if (kid.distance > kid.maxDistance) kid.distance = kid.maxDistance;
        if (kid.distance < kid.minDistance) kid.distance = kid.minDistance;

        // If kid reaches cookie ⇒ game over
        if (kid.distance <= kid.minDistance + 1) {
          endGame("The kid caught the cookie!");
        }

        /*** SCREEN SHAKE TIMER ***********************************************/

        if (shakeTimer > 0) {
          shakeTimer -= deltaSec;
          if (shakeTimer < 0) shakeTimer = 0;
        }
      }

      /*** RENDERING ***********************************************************/

      function drawBackground(theme) {
        // Sky
        ctx.fillStyle = theme.skyColor;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Far parallax bands
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0, GAME_HEIGHT * 0.18, GAME_WIDTH, 40);

        ctx.fillStyle = "rgba(0,0,0,0.04)";
        ctx.fillRect(0, GAME_HEIGHT * 0.32, GAME_WIDTH, 30);

        // Ground
        ctx.fillStyle = theme.groundColor;
        ctx.fillRect(0, groundY, GAME_WIDTH, GAME_HEIGHT - groundY);

        // Ground line
        ctx.strokeStyle = "rgba(0,0,0,0.22)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, groundY + 0.5);
        ctx.lineTo(GAME_WIDTH, groundY + 0.5);
        ctx.stroke();

        // Simple repeating ground pattern
        ctx.strokeStyle = "rgba(0,0,0,0.09)";
        ctx.lineWidth = 2;
        const step = 40;
        for (let x = 0; x < GAME_WIDTH + step; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, groundY + 4);
          ctx.lineTo(x + 16, groundY + 22);
          ctx.stroke();
        }
      }

      function drawCookie() {
        const cx = cookie.x + cookie.width / 2;
        const cy = cookie.y + cookie.height / 2;
        const radiusX = cookie.width * 0.52;
        const radiusY = cookie.height * 0.48;

        // Body color (flash red when recently hit)
        let bodyColor = "#d89d4a";
        if (cookie.hitFlashTimer > 0) {
          const t = cookie.hitFlashTimer / 0.35;
          const alpha = 0.2 + 0.4 * t;
          bodyColor = `rgba(255, 80, 80, ${0.7})`;
          ctx.fillStyle = bodyColor;
        } else {
          ctx.fillStyle = bodyColor;
        }

        ctx.save();
        ctx.beginPath();
        ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
        ctx.fill();

        // Chocolate chips
        ctx.fillStyle = "#5b3a1f";
        for (let i = 0; i < 7; i++) {
          const angle = (Math.PI * 2 * i) / 7;
          const rr = radiusX * 0.55;
          const px = cx + rr * Math.cos(angle) + (i % 2 === 0 ? 6 : -4);
          const py = cy + rr * Math.sin(angle) * 0.7;
          ctx.beginPath();
          ctx.arc(px, py, 5, 0, Math.PI * 2);
          ctx.fill();
        }

        // Tiny arms & legs
        ctx.strokeStyle = "#5b3a1f";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";

        // Arms
        ctx.beginPath();
        ctx.moveTo(cx - radiusX * 0.75, cy - 4);
        ctx.lineTo(cx - radiusX * 0.95, cy + 10);
        ctx.moveTo(cx + radiusX * 0.75, cy - 4);
        ctx.lineTo(cx + radiusX * 0.95, cy + 10);
        ctx.stroke();

        // Legs
        ctx.beginPath();
        ctx.moveTo(cx - radiusX * 0.25, cy + radiusY * 0.9);
        ctx.lineTo(cx - radiusX * 0.25, cy + radiusY * 1.2);
        ctx.moveTo(cx + radiusX * 0.25, cy + radiusY * 0.9);
        ctx.lineTo(cx + radiusX * 0.25, cy + radiusY * 1.2);
        ctx.stroke();

        // Bouncing googly eyes
        const eyeOffsetX = 16;
        const eyeOffsetY = -10;
        const eyeRadius = 13;

        const eyeBounce =
          Math.sin(elapsedSinceStart * 10 + cookie.y * 0.03) * 2;

        // White part
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(
          cx - eyeOffsetX,
          cy + eyeOffsetY + eyeBounce * 0.8,
          eyeRadius,
          0,
          Math.PI * 2
        );
        ctx.arc(
          cx + eyeOffsetX,
          cy + eyeOffsetY + eyeBounce,
          eyeRadius,
          0,
          Math.PI * 2
        );
        ctx.fill();

        // Pupils slightly "looking forward"
        const pupilRadius = 6;
        const pupilOffsetX = 4 + Math.sin(elapsedSinceStart * 3) * 1.6;
        const pupilOffsetY = 3 + Math.cos(elapsedSinceStart * 2.4) * 1.2;

        ctx.fillStyle = "#111111";
        ctx.beginPath();
        ctx.arc(
          cx - eyeOffsetX + pupilOffsetX,
          cy + eyeOffsetY + pupilOffsetY + eyeBounce * 0.8,
          pupilRadius,
          0,
          Math.PI * 2
        );
        ctx.arc(
          cx + eyeOffsetX + pupilOffsetX,
          cy + eyeOffsetY + pupilOffsetY + eyeBounce,
          pupilRadius,
          0,
          Math.PI * 2
        );
        ctx.fill();

        // Simple smile
        ctx.strokeStyle = "#5b3a1f";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy + 16, 20, 0.15 * Math.PI, 0.85 * Math.PI, false);
        ctx.stroke();

        ctx.restore();
      }

      function drawKid(theme) {
        // Kid position determined by distance behind cookie
        const kidX = cookie.x - kid.distance;
        const kidY = groundY - 120;

        // If completely off screen, still draw partially to hint presence
        if (kidX < -120) return;

        ctx.save();

        // Body
        ctx.fillStyle = "#f2c49b";
        // Head
        ctx.beginPath();
        ctx.arc(kidX + 40, kidY + 32, 28, 0, Math.PI * 2);
        ctx.fill();

        // Hair
        ctx.fillStyle = "#5c3b20";
        ctx.beginPath();
        ctx.ellipse(kidX + 40, kidY + 20, 30, 18, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eyes big & goofy
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(kidX + 30, kidY + 30, 7.5, 0, Math.PI * 2);
        ctx.arc(kidX + 48, kidY + 30, 7.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#111111";
        const eyeJiggle = Math.sin(elapsedSinceStart * 5) * 1.3;
        ctx.beginPath();
        ctx.arc(kidX + 30 + 1 + eyeJiggle, kidY + 30 + 1, 3, 0, Math.PI * 2);
        ctx.arc(kidX + 48 + 2 + eyeJiggle, kidY + 30 + 1, 3, 0, Math.PI * 2);
        ctx.fill();

        // Mouth open (hungry!)
        ctx.fillStyle = "#b0303a";
        ctx.beginPath();
        ctx.arc(kidX + 39, kidY + 43, 12, 0, Math.PI, false);
        ctx.fill();

        // Torso
        ctx.fillStyle = "#4a7bd4";
        ctx.fillRect(kidX + 18, kidY + 55, 44, 45);

        // Arms pumping
        ctx.strokeStyle = "#f2c49b";
        ctx.lineWidth = 5;
        const armSwing = Math.sin(elapsedSinceStart * 12) * 10;
        ctx.beginPath();
        ctx.moveTo(kidX + 18, kidY + 62);
        ctx.lineTo(kidX + 4, kidY + 62 + armSwing);
        ctx.moveTo(kidX + 62, kidY + 62);
        ctx.lineTo(kidX + 76, kidY + 62 - armSwing);
        ctx.stroke();

        // Legs
        ctx.strokeStyle = "#2d3f7b";
        ctx.lineWidth = 6;
        const legSwing = Math.cos(elapsedSinceStart * 12) * 10;
        ctx.beginPath();
        ctx.moveTo(kidX + 28, kidY + 100);
        ctx.lineTo(kidX + 28 + legSwing, kidY + 126);
        ctx.moveTo(kidX + 50, kidY + 100);
        ctx.lineTo(kidX + 50 - legSwing, kidY + 126);
        ctx.stroke();

        ctx.restore();
      }

      function drawObstacle(o) {
        ctx.save();

        if (o.theme === "Kitchen") {
          if (o.kind === "rollingPin") {
            ctx.fillStyle = "#c9965b";
            ctx.fillRect(o.x, o.y, o.width, o.height);
            ctx.fillStyle = "#8a5a2b";
            ctx.fillRect(o.x - 8, o.y + 2, 10, o.height - 4);
            ctx.fillRect(o.x + o.width - 2, o.y + 2, 10, o.height - 4);
          } else if (o.kind === "milkPuddle") {
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.ellipse(
              o.x + o.width / 2,
              groundY + 10,
              o.width / 2,
              14,
              0,
              0,
              Math.PI * 2
            );
            ctx.fill();
          } else if (o.kind === "spoon") {
            ctx.fillStyle = "#c0c6cf";
            ctx.fillRect(o.x + o.width / 2 - 4, o.y, 8, o.height - 30);
            ctx.beginPath();
            ctx.ellipse(
              o.x + o.width / 2,
              o.y + o.height - 34,
              16,
              12,
              0,
              0,
              Math.PI * 2
            );
            ctx.fill();
          }
        } else if (o.theme === "Backyard") {
          if (o.kind === "sprinkler") {
            ctx.fillStyle = "#5b6d7a";
            ctx.fillRect(o.x + 18, o.y, o.width - 36, o.height);
            // water arcs
            ctx.strokeStyle = "rgba(100,180,255,0.7)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(o.x + 10, groundY - 20, 22, Math.PI * 1.2, Math.PI * 1.9);
            ctx.arc(
              o.x + o.width - 10,
              groundY - 20,
              22,
              Math.PI * 1.2,
              Math.PI * 1.9
            );
            ctx.stroke();
          } else if (o.kind === "dogToy") {
            ctx.fillStyle = "#f5af3b";
            ctx.beginPath();
            ctx.ellipse(
              o.x + o.width / 2 - 8,
              o.y + o.height / 2,
              14,
              18,
              0,
              0,
              Math.PI * 2
            );
            ctx.ellipse(
              o.x + o.width / 2 + 8,
              o.y + o.height / 2,
              14,
              18,
              0,
              0,
              Math.PI * 2
            );
            ctx.fill();
          } else if (o.kind === "rake") {
            ctx.fillStyle = "#8a5a2b";
            ctx.fillRect(o.x + o.width / 2 - 4, o.y, 8, o.height);
            ctx.fillStyle = "#444b50";
            ctx.fillRect(o.x, o.y + o.height - 16, o.width, 12);
          }
        } else if (o.theme === "City Street") {
          if (o.kind === "trashCan") {
            ctx.fillStyle = "#525b66";
            ctx.fillRect(o.x, o.y, o.width, o.height);
            ctx.fillStyle = "#343a40";
            ctx.fillRect(o.x - 4, o.y - 10, o.width + 8, 12);
          } else if (o.kind === "pigeons") {
            ctx.fillStyle = "#b5bcc4";
            ctx.beginPath();
            ctx.arc(o.x + 20, o.y + 16, 14, 0, Math.PI * 2);
            ctx.arc(o.x + 50, o.y + 20, 14, 0, Math.PI * 2);
            ctx.fill();
          } else if (o.kind === "streetSign") {
            ctx.fillStyle = "#786449";
            ctx.fillRect(o.x + o.width / 2 - 4, o.y, 8, o.height);
            ctx.fillStyle = "#f6cf4a";
            ctx.fillRect(o.x, o.y - 16, o.width, 36);
          }
        }

        ctx.restore();
      }

      function drawHUD(theme) {
        ctx.save();

        // Game title
        ctx.font = "32px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(10,10,20,0.9)";
        ctx.fillText("Run, Cookie, Run!", 26, 42);

        // Level name
        ctx.font = "24px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(20,20,30,0.9)";
        ctx.fillText("Level: " + theme.name, 26, 76);

        // Score (top right)
        const scoreText = "Score: " + Math.floor(score).toString();
        ctx.font = "28px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(20,20,30,0.95)";
        const scoreWidth = ctx.measureText(scoreText).width;
        ctx.fillText(scoreText, GAME_WIDTH - scoreWidth - 24, 42);

        // High score
        const hsText = "Best: " + Math.floor(highScore).toString();
        ctx.font = "22px system-ui, -apple-system, sans-serif";
        const hsWidth = ctx.measureText(hsText).width;
        ctx.fillStyle = "rgba(20,20,30,0.8)";
        ctx.fillText(hsText, GAME_WIDTH - hsWidth - 24, 72);

        ctx.restore();
      }

      function drawStartScreen(theme) {
        ctx.save();

        // Slightly dim background
        ctx.fillStyle = "rgba(5, 6, 8, 0.72)";
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        ctx.textAlign = "center";

        ctx.font = "36px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(
          "Run, Cookie, Run!",
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.34
        );

        ctx.font = "24px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(245,245,245,0.9)";
        ctx.fillText(
          "Press Enter to Start",
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.46
        );

        ctx.font = "22px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(245,245,245,0.9)";
        ctx.fillText(
          "SPACE: Jump    ↓: Slide",
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.56
        );
        ctx.fillText(
          "Avoid obstacles, don't let the kid catch you!",
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.64
        );

        ctx.restore();
      }

      function drawGameOverScreen() {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        ctx.textAlign = "center";

        ctx.font = "34px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("Game Over", GAME_WIDTH / 2, GAME_HEIGHT * 0.34);

        ctx.font = "24px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(245,245,245,0.95)";
        ctx.fillText(gameOverReason, GAME_WIDTH / 2, GAME_HEIGHT * 0.42);

        const finalScore = Math.floor(score);
        const bestScore = Math.floor(highScore);

        ctx.font = "24px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(245,245,245,0.95)";
        ctx.fillText(
          "Score: " + finalScore,
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.52
        );
        ctx.fillText(
          "Best: " + bestScore,
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.60
        );

        ctx.font = "22px system-ui, -apple-system, sans-serif";
        ctx.fillStyle = "rgba(245,245,245,0.9)";
        ctx.fillText(
          "Press R to Restart · Press Enter to Play Again",
          GAME_WIDTH / 2,
          GAME_HEIGHT * 0.70
        );

        ctx.restore();
      }

      function render() {
        const theme = Themes[themeIndex];

        // Screen shake transform around center when caught
        ctx.save();
        if (shakeTimer > 0) {
          const t = shakeTimer / SHAKE_DURATION;
          const magnitude = SHAKE_INTENSITY * t;
          const offsetX = (Math.random() * 2 - 1) * magnitude;
          const offsetY = (Math.random() * 2 - 1) * magnitude;
          ctx.translate(offsetX, offsetY);
        }

        drawBackground(theme);

        // Draw kid and cookie
        drawKid(theme);
        drawCookie();

        // Obstacles
        for (let i = 0; i < obstacles.length; i++) {
          drawObstacle(obstacles[i]);
        }

        // HUD
        drawHUD(theme);

        ctx.restore();

        // Overlays based on state
        if (gameState === State.START) {
          drawStartScreen(theme);
        } else if (gameState === State.GAME_OVER) {
          drawGameOverScreen();
        }
      }

      /*** MAIN LOOP ***********************************************************/

      function loop(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaMs = timestamp - lastTimestamp;
        let deltaSec = deltaMs / 1000;
        if (!Number.isFinite(deltaSec) || deltaSec <= 0) {
          deltaSec = 0;
        }
        // Clamp delta to avoid huge jumps on tab switch
        if (deltaSec > 0.06) deltaSec = 0.06;
        lastTimestamp = timestamp;

        update(deltaSec);
        render();

        window.requestAnimationFrame(loop);
      }

      resetGameVariables();
      window.requestAnimationFrame(loop);
    })();
  </script>
</body>
